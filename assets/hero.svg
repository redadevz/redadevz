<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="200" viewBox="0 0 1000 200" fill="none" role="img" aria-label="Reda MAAZI - Full-Stack Developer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#0a0e16"/>
    </linearGradient>
    <linearGradient id="name" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#79c0ff"/>
      <stop offset="1" stop-color="#1f6feb"/>
    </linearGradient>
    <style>
      .fade { animation: fade 1.4s ease-out both; }
      @keyframes fade { from { opacity:0 } to { opacity:1 } }
    </style>
  </defs>

  <rect width="1000" height="200" rx="14" fill="url(#bg)"/>

  <text class="fade" x="500" y="56" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',monospace" font-size="14" letter-spacing="4" fill="#388bfd">redadevz</text>

  <text x="500" y="120" text-anchor="middle" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="58" font-weight="800" letter-spacing="2" fill="url(#name)">Reda&#160;MAAZI</text>

  <rect class="fade" x="430" y="138" width="140" height="2" rx="1" fill="#1f6feb"/>

  <text class="fade" x="500" y="168" text-anchor="middle" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="15" font-weight="600" letter-spacing="5" fill="#8b949e">FULL-STACK&#160;DEVELOPER</text>
</svg>
