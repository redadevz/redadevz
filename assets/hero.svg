<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="260" viewBox="0 0 1000 260" fill="none" role="img" aria-label="Reda MAAZI - Full-Stack Developer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a14"/>
      <stop offset="0.5" stop-color="#15102e"/>
      <stop offset="1" stop-color="#0a0a14"/>
    </linearGradient>

    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="0.5" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#a78bfa"/>
      <animate attributeName="x1" values="-1;1"  dur="5s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0;2"   dur="5s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#7c3aed" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#a78bfa" stop-opacity="1"/>
      <stop offset="1"   stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>

    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#a78bfa" stroke-width="0.5" stroke-opacity="0.06"/>
    </pattern>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="48"/>
    </filter>

    <style>
      .pulse  { animation: pulse 6s ease-in-out infinite; transform-origin: center; }
      .pulse2 { animation: pulse 7s ease-in-out infinite 1s; transform-origin: center; }
      .fade   { animation: fade 1.6s ease-out both; }
      .fade2  { animation: fade 2.2s ease-out both; }
      .float  { animation: floaty 7s ease-in-out infinite; }
      .float2 { animation: floaty 9s ease-in-out infinite 1.5s; }
      @keyframes pulse  { 0%,100% { opacity:.35 } 50% { opacity:.7 } }
      @keyframes fade   { from { opacity:0 } to { opacity:1 } }
      @keyframes floaty { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-9px) } }
    </style>
  </defs>

  <!-- background -->
  <rect width="1000" height="260" rx="16" fill="url(#bg)"/>
  <rect width="1000" height="260" rx="16" fill="url(#grid)"/>

  <!-- glow orbs -->
  <circle class="pulse"  cx="330" cy="150" r="70" fill="#7c3aed" filter="url(#soft)"/>
  <circle class="pulse2" cx="680" cy="110" r="80" fill="#4c1d95" filter="url(#soft)"/>

  <!-- floating accent dots -->
  <circle class="float"  cx="120" cy="70"  r="3" fill="#a78bfa" opacity="0.8"/>
  <circle class="float2" cx="900" cy="190" r="3" fill="#a78bfa" opacity="0.7"/>
  <circle class="float2" cx="160" cy="200" r="2" fill="#7c3aed" opacity="0.7"/>
  <circle class="float"  cx="860" cy="60"  r="2" fill="#a78bfa" opacity="0.7"/>

  <!-- top mono tag -->
  <text class="fade" x="500" y="64" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',monospace" font-size="15" letter-spacing="3" fill="#7c3aed">&lt;/&gt;&#160;&#160;redadevz</text>

  <!-- name -->
  <text x="500" y="150" text-anchor="middle" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="74" font-weight="800" letter-spacing="2" fill="url(#sweep)" filter="url(#glow)">REDA&#160;MAAZI</text>

  <!-- accent line -->
  <rect class="fade2" x="380" y="172" width="240" height="2.5" rx="1.25" fill="url(#accent)"/>

  <!-- subtitle -->
  <text class="fade2" x="500" y="208" text-anchor="middle" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="18" font-weight="600" letter-spacing="6" fill="#c9b6ff">FULL-STACK&#160;DEVELOPER</text>
  <text class="fade2" x="500" y="232" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',monospace" font-size="13" letter-spacing="2" fill="#6d6a8a">Laravel&#160;+&#160;Vue.js&#160;&#183;&#160;Agadir,&#160;Morocco</text>
</svg>
