<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="240" viewBox="0 0 1000 240" fill="none" role="img" aria-label="Reda MAAZI - Full-Stack Developer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e16"/>
      <stop offset="0.5" stop-color="#0d1730"/>
      <stop offset="1" stop-color="#0a0e16"/>
    </linearGradient>

    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1f6feb"/>
      <stop offset="0.5" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#58a6ff"/>
      <animate attributeName="x1" values="-1;1"  dur="5s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0;2"   dur="5s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#1f6feb" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#58a6ff" stop-opacity="1"/>
      <stop offset="1"   stop-color="#1f6feb" stop-opacity="0"/>
    </linearGradient>

    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#58a6ff" stroke-width="0.5" stroke-opacity="0.06"/>
    </pattern>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="50"/>
    </filter>

    <style>
      .pulse  { animation: pulse 6s ease-in-out infinite; transform-origin: center; }
      .pulse2 { animation: pulse 7s ease-in-out infinite 1s; transform-origin: center; }
      .fade   { animation: fade 1.6s ease-out both; }
      .fade2  { animation: fade 2.2s ease-out both; }
      .float  { animation: floaty 7s ease-in-out infinite; }
      .float2 { animation: floaty 9s ease-in-out infinite 1.5s; }
      @keyframes pulse  { 0%,100% { opacity:.30 } 50% { opacity:.6 } }
      @keyframes fade   { from { opacity:0 } to { opacity:1 } }
      @keyframes floaty { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-9px) } }
    </style>
  </defs>

  <rect width="1000" height="240" rx="16" fill="url(#bg)"/>
  <rect width="1000" height="240" rx="16" fill="url(#grid)"/>

  <circle class="pulse"  cx="330" cy="140" r="72" fill="#1f6feb" filter="url(#soft)"/>
  <circle class="pulse2" cx="680" cy="100" r="82" fill="#1e3a8a" filter="url(#soft)"/>

  <circle class="float"  cx="120" cy="64"  r="3" fill="#58a6ff" opacity="0.8"/>
  <circle class="float2" cx="900" cy="180" r="3" fill="#58a6ff" opacity="0.7"/>
  <circle class="float2" cx="160" cy="190" r="2" fill="#1f6feb" opacity="0.7"/>
  <circle class="float"  cx="860" cy="56"  r="2" fill="#58a6ff" opacity="0.7"/>

  <text class="fade" x="500" y="62" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',monospace" font-size="15" letter-spacing="3" fill="#388bfd">&lt;/&gt;&#160;&#160;redadevz</text>

  <text x="500" y="146" text-anchor="middle" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="74" font-weight="800" letter-spacing="2" fill="url(#sweep)" filter="url(#glow)">REDA&#160;MAAZI</text>

  <rect class="fade2" x="380" y="168" width="240" height="2.5" rx="1.25" fill="url(#accent)"/>

  <text class="fade2" x="500" y="202" text-anchor="middle" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="18" font-weight="600" letter-spacing="6" fill="#79c0ff">FULL-STACK&#160;DEVELOPER</text>
</svg>
